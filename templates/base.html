<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prazos SENAC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #1a3a5c !important; }
    .navbar-brand { font-weight: 700; font-size: 1.2rem; color: #fff !important; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .btn-primary { background: #1a3a5c; border-color: #1a3a5c; }
    .btn-primary:hover { background: #122940; border-color: #122940; }
    .badge-hoje    { background: #dc3545; }
    .badge-urgente { background: #fd7e14; }
  </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <span class="navbar-brand"><i class="bi bi-mortarboard-fill me-2"></i>Prazos SENAC</span>
  </div>
</nav>
<div class="container pb-5">
  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
      {{ msg }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
